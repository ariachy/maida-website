    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
      max-width: 500px;
      animation: fadeUp 0.8s var(--ease-out-expo) forwards;
    }
    
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Logo SVG */
    .logo {
      width: 280px;
      max-width: 80vw;
      height: auto;
      margin-bottom: 1rem;
    }
    
    .logo path {
      fill: var(--terracotta);
    }
    
    .tagline {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 3rem;
    }
    
    .message {
      font-family: 'Fraunces', serif;
      font-size: 1.75rem;
      font-weight: 300;
      line-height: 1.4;
      margin-bottom: 1rem;
      color: var(--warm-white);
    }
    
    .submessage {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--stone);
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    
    /* Elegant loading animation */
    .loader {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }
    
    .loader-dot {
      width: 6px;
      height: 6px;
      background: var(--terracotta);
      border-radius: 50%;
      animation: pulse 1.5s var(--ease) infinite;
    }
    
    .loader-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .loader-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.4;
      }
      50% {
        transform: scale(1.3);
        opacity: 1;
      }
    }
    
    /* Progress bar */
    .progress-container {
      width: 180px;
      height: 2px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
      overflow: hidden;
    }
    
    .progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, var(--terracotta), var(--terracotta-light));
      border-radius: 2px;
      animation: progress 2s var(--ease) infinite;
    }
    
    @keyframes progress {
      0% {
        width: 0%;
        margin-left: 0%;
      }
      50% {
        width: 50%;
        margin-left: 25%;
      }
      100% {
        width: 0%;
        margin-left: 100%;
      }
    }
    
    .divider {
      width: 40px;
      height: 1px;
      background: var(--sand);
      opacity: 0.2;
      margin: 0 auto 1.5rem;
    }
    
    .footer-text {
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--stone);
    }
    
    .refresh-note {
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--stone);
      opacity: 0.6;
      margin-top: 2rem;
    }
    
    /* Decorative corner accents */
    .corner {
      position: fixed;
      width: 80px;
      height: 80px;
      border-color: var(--terracotta);
      opacity: 0.1;
    }
    
    .corner-tl {
      top: 2rem;
      left: 2rem;
      border-top: 1px solid;
      border-left: 1px solid;
    }
    
    .corner-tr {
      top: 2rem;
      right: 2rem;
      border-top: 1px solid;
      border-right: 1px solid;
    }
    
    .corner-bl {
      bottom: 2rem;
      left: 2rem;
      border-bottom: 1px solid;
      border-left: 1px solid;
    }
    
    .corner-br {
      bottom: 2rem;
      right: 2rem;
      border-bottom: 1px solid;
      border-right: 1px solid;
    }
    
    @media (max-width: 640px) {
      .corner {
        width: 40px;
        height: 40px;
      }
      
      .corner-tl, .corner-tr {
        top: 1rem;
      }
      
      .corner-tl, .corner-bl {
        left: 1rem;
      }
      
      .corner-tr, .corner-br {
        right: 1rem;
      }
      
      .corner-bl, .corner-br {
        bottom: 1rem;
      }
      
      .logo {
        width: 220px;
      }
      
      .message {
        font-size: 1.5rem;
      }
      
      .bg-pattern {
        background-size: 140px;
      }
    }
  </style>
</head>

  <script>
    // Auto-refresh every 10 seconds to check if site is back
    let attempts = 0;
    const maxAttempts = 30; // 5 minutes max
    
    function checkSite() {
      attempts++;
      
      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(response => {
          // If we get a real response (not this maintenance page), reload
          if (response.ok) {
            window.location.reload();
          }
        })
        .catch(() => {
          // Site still building, try again
          if (attempts < maxAttempts) {
            setTimeout(checkSite, 10000);
          }
        });
    }
    
    // Start checking after 30 seconds (give build time to start)
    setTimeout(checkSite, 30000);
  </script>
